name: RC1 Rider Release Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'rc1-release-*'

jobs:
  web:
    name: Build Rider Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: flutter pub get
      - run: node --test test/rider_deployment_manifest_test.js
      - run: RIDER_WEB_RECAPTCHA_ENTERPRISE_SITE_KEY="${{ secrets.RIDER_WEB_RECAPTCHA_ENTERPRISE_SITE_KEY }}" scripts/build_rider_web.sh
      - run: node scripts/rider_deployment_manifest.js verify
      - uses: actions/upload-artifact@v4
        with:
          name: rider-web-release
          path: build/web

  rider-mobile:
    name: Build Rider Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> android/gradle.properties
      - name: Create CI release keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/rc1-ci-keystore.jks \
            -storepass rc1release \
            -keypass rc1release \
            -alias rc1-ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=RC1 CI,O=Circum Rider,C=GB"
          cat > android/key.properties <<'EOF'
          storePassword=rc1release
          keyPassword=rc1release
          keyAlias=rc1-ci
          storeFile=rc1-ci-keystore.jks
          EOF
      - run: flutter build apk --release --target=lib/main.dart
      - uses: actions/upload-artifact@v4
        with:
          name: rider-android-release
          path: build/app/outputs/flutter-apk/app-release.apk
