<!DOCTYPE html><html><head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Circum rider app for receiving and completing delivery requests.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Circum Rider">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Circum Rider</title>
  <meta name="circum-rider-build" content="rider-web-cache-v2">
  
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #07090F;
          background-size: 100% 100%;
    }

    #startup-shell { position: fixed; inset: 0; display: grid; place-items: center; padding: 24px; color: #F5F7FB; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: #07090F; z-index: 9999; }
    .startup-card { width: min(420px, 100%); text-align: center; }
    .startup-brand { color: #3B82F6; font-size: 13px; font-weight: 800; letter-spacing: 2px; }
    .startup-spinner { width: 28px; height: 28px; margin: 24px auto 18px; border: 3px solid rgba(59,130,246,.22); border-top-color: #3B82F6; border-radius: 50%; animation: spin .8s linear infinite; }
    .startup-title { margin: 0; font-size: 21px; }
    .startup-copy { color: #9CA8B8; line-height: 1.5; }
    .startup-actions { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
    .startup-actions button { min-height: 46px; border-radius: 12px; border: 1px solid rgba(255,255,255,.12); padding: 0 20px; color: #F5F7FB; background: #111827; font-weight: 700; cursor: pointer; }
    .startup-actions button:first-child { background: #3B82F6; border-color: #3B82F6; }
    #startup-error { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .startup-spinner { animation: none; } }
  </style>
  <script id="splash-screen-script">
    function removeStartupShell() {
      document.getElementById("startup-shell")?.remove();
    }
  </script>
</head>
<body>
  <div id="startup-shell" role="status" aria-live="polite">
    <div class="startup-card">
      <div class="startup-brand">CIRCUM RIDER</div>
      <div id="startup-loading">
        <div class="startup-spinner" aria-hidden="true"></div>
        <h1 class="startup-title">Starting Rider</h1>
      </div>
      <div id="startup-error" role="alert">
        <h1 class="startup-title">Something went wrong.</h1>
        <p class="startup-copy">We could not start Rider. Check your connection and try again.</p>
        <p class="startup-copy">Reference: RDR-WEB-BOOT-001</p>
        <div class="startup-actions">
          <button type="button" onclick="location.reload()">Retry</button>
          <button type="button" onclick="location.href = location.href">Reload</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', removeStartupShell, { once: true });
    window.setTimeout(function () {
      if (!document.getElementById('startup-shell')) return;
      document.getElementById('startup-loading').style.display = 'none';
      document.getElementById('startup-error').style.display = 'block';
    }, 20000);
  </script>
  <script src="flutter_bootstrap.js" async></script>


</body></html>
